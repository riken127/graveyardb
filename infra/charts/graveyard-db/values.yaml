replicaCount: 3

image:
  repository: ghcr.io/riken127/graveyardb
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 50051
  headlessPort: 50051

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

podSecurityContext:
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 1
  readiness:
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 1
  liveness:
    failureThreshold: 3
    periodSeconds: 15
    timeoutSeconds: 1

affinity:
  podAntiAffinity: true

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

auth:
  existingSecret: ""
  secretKey: AUTH_TOKEN
  token: ""

server:
  scyllaUri: "scylla-client.scylla.svc.cluster.local:9042"
  scyllaKeyspace: "graveyard"
  requestTimeoutMs: 5000
  requireTls: false
  requireAuth: true
  otelEnabled: false
  otelFailFast: false
  tlsCertPath: /etc/graveyard/tls/tls.crt
  tlsKeyPath: /etc/graveyard/tls/tls.key
